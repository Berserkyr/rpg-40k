name: CI

on:
  push:
  pull_request:

jobs:
  backend-tests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run tests
        run: pytest

  frontend-build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Build frontend
        working-directory: frontend
        run: npm run build

  frontend-unit-tests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Run frontend unit tests
        working-directory: frontend
        run: npm test

  security-audit:
    runs-on: ubuntu-latest
    # Audit de sécurité des dépendances (OWASP A06 - Vulnerable Components).
    # Non bloquant : informe sans casser la CI sur une vulnérabilité tierce.
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Audit Python dependencies (pip-audit)
        run: |
          python -m pip install --upgrade pip pip-audit
          pip-audit -r requirements.txt || true

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Audit frontend dependencies (npm audit)
        working-directory: frontend
        run: npm audit --audit-level=high || true

  e2e-tests:
    runs-on: ubuntu-latest
    needs: [backend-tests, frontend-build, frontend-unit-tests]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Install Playwright browser
        working-directory: frontend
        run: npx playwright install --with-deps chromium

      - name: Start backend
        run: |
          python -m uvicorn backend.api:app --host 127.0.0.1 --port 8000 &
          for i in {1..30}; do
            curl -fsS http://127.0.0.1:8000/api/health && exit 0
            sleep 1
          done
          exit 1

      - name: Start frontend
        working-directory: frontend
        run: |
          npm run dev -- --host=127.0.0.1 --port=5173 &
          for i in {1..30}; do
            curl -fsS http://localhost:5173 && exit 0
            sleep 1
          done
          exit 1

      - name: Run Playwright e2e tests
        working-directory: frontend
        run: npm run e2e
