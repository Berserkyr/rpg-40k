services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: rpg40k-backend
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - rpg40k_data:/app/data
      - rpg40k_saves:/app/saves
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/api/health', timeout=5)"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_BASE: ${VITE_API_BASE:-/api}
    container_name: rpg40k-frontend
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "127.0.0.1:${RPG40K_HTTP_PORT:-8081}:80"

volumes:
  rpg40k_data:
  rpg40k_saves:
