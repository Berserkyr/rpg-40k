stages:
  - test
  - build
  - e2e
  - deploy

backend-tests:
  stage: test
  image: python:3.13
  before_script:
    - python -m pip install --upgrade pip
    - pip install -r requirements.txt
  script:
    - pytest
  artifacts:
    when: always
    expire_in: 7 days
    paths:
      - .pytest_cache/

frontend-build:
  stage: build
  image: node:22
  cache:
    key: npm-${CI_COMMIT_REF_SLUG}
    paths:
      - frontend/.npm/
  before_script:
    - cd frontend
    - npm ci --cache .npm --prefer-offline
  script:
    - npm run build
  artifacts:
    expire_in: 7 days
    paths:
      - frontend/dist/

frontend-unit-tests:
  stage: test
  image: node:22
  cache:
    key: npm-${CI_COMMIT_REF_SLUG}
    paths:
      - frontend/.npm/
  before_script:
    - cd frontend
    - npm ci --cache .npm --prefer-offline
  script:
    - npm test

end-to-end-tests:
  stage: e2e
  image: mcr.microsoft.com/playwright:v1.57.0-noble
  needs:
    - backend-tests
    - frontend-build
    - frontend-unit-tests
  before_script:
    - python -m pip install --upgrade pip
    - pip install -r requirements.txt
    - cd frontend
    - npm ci
    - cd ..
  script:
    - python -m uvicorn backend.api:app --host 127.0.0.1 --port 8000 &
    - for i in $(seq 1 30); do curl -fsS http://127.0.0.1:8000/api/health && break || sleep 1; done
    - cd frontend
    - npm run dev -- --host=0.0.0.0 --port=5173 &
    - for i in $(seq 1 30); do curl -fsS http://localhost:5173 && break || sleep 1; done
    - npm run e2e
  artifacts:
    when: always
    expire_in: 7 days
    paths:
      - frontend/test-results/
      - frontend/playwright-report/

deploy-vps:
  stage: deploy
  image: alpine:3.20
  needs:
    - backend-tests
    - frontend-build
    - frontend-unit-tests
    - end-to-end-tests
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'
      when: manual
    - when: never
  before_script:
    - apk add --no-cache openssh-client git curl bash
    - test -n "$VPS_HOST" || (echo "Variable VPS_HOST manquante" && exit 1)
    - test -n "$VPS_USER" || (echo "Variable VPS_USER manquante" && exit 1)
    - test -n "$SSH_PRIVATE_KEY" || (echo "Variable SSH_PRIVATE_KEY manquante" && exit 1)
    - mkdir -p ~/.ssh
    - printf '%s\n' "$SSH_PRIVATE_KEY" > ~/.ssh/vps_key
    - chmod 600 ~/.ssh/vps_key
    - ssh-keyscan -p "${VPS_PORT:-22}" "$VPS_HOST" >> ~/.ssh/known_hosts
  script:
    - |
      ssh -i ~/.ssh/vps_key -p "${VPS_PORT:-22}" "$VPS_USER@$VPS_HOST" \
        "APP_DIR='${APP_DIR:-/opt/rpg-40k}' REPO_URL='$CI_REPOSITORY_URL' BRANCH='main' RPG40K_BIND_ADDRESS='${RPG40K_BIND_ADDRESS:-0.0.0.0}' RPG40K_HTTP_PORT='${RPG40K_HTTP_PORT:-8081}' bash -s" <<'REMOTE'
      set -euo pipefail

      if [ ! -d "$APP_DIR/.git" ]; then
        mkdir -p "$APP_DIR"
        git clone --branch "$BRANCH" "$REPO_URL" "$APP_DIR"
      else
        git -C "$APP_DIR" fetch origin "$BRANCH"
        git -C "$APP_DIR" checkout "$BRANCH"
        git -C "$APP_DIR" pull --ff-only origin "$BRANCH"
      fi

      cd "$APP_DIR"
      [ -f .env ] || cp .env.example .env
      grep -q '^RPG40K_BIND_ADDRESS=' .env && sed -i "s/^RPG40K_BIND_ADDRESS=.*/RPG40K_BIND_ADDRESS=$RPG40K_BIND_ADDRESS/" .env || echo "RPG40K_BIND_ADDRESS=$RPG40K_BIND_ADDRESS" >> .env
      grep -q '^RPG40K_HTTP_PORT=' .env && sed -i "s/^RPG40K_HTTP_PORT=.*/RPG40K_HTTP_PORT=$RPG40K_HTTP_PORT/" .env || echo "RPG40K_HTTP_PORT=$RPG40K_HTTP_PORT" >> .env
      grep -q '^VITE_API_BASE=' .env && sed -i 's#^VITE_API_BASE=.*#VITE_API_BASE=/api#' .env || echo 'VITE_API_BASE=/api' >> .env

      docker compose -p rpg40k up -d --build
      docker compose -p rpg40k ps
      curl -fsS "http://127.0.0.1:$RPG40K_HTTP_PORT/api/health"
      REMOTE
  environment:
    name: production
    url: http://$VPS_HOST:${RPG40K_HTTP_PORT}
