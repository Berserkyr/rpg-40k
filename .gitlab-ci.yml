stages:
  - test
  - build
  - e2e

backend-tests:
  stage: test
  image: python:3.13
  before_script:
    - python -m pip install --upgrade pip
    - pip install -r requirements.txt
  script:
    - pytest
  artifacts:
    when: always
    expire_in: 7 days
    paths:
      - .pytest_cache/

frontend-build:
  stage: build
  image: node:22
  cache:
    key: npm-${CI_COMMIT_REF_SLUG}
    paths:
      - frontend/.npm/
  before_script:
    - cd frontend
    - npm ci --cache .npm --prefer-offline
  script:
    - npm run build
  artifacts:
    expire_in: 7 days
    paths:
      - frontend/dist/

end-to-end-tests:
  stage: e2e
  image: mcr.microsoft.com/playwright:v1.57.0-noble
  needs:
    - backend-tests
    - frontend-build
  before_script:
    - python -m pip install --upgrade pip
    - pip install -r requirements.txt
    - cd frontend
    - npm ci
    - cd ..
  script:
    - python -m uvicorn backend.api:app --host 127.0.0.1 --port 8000 &
    - for i in $(seq 1 30); do curl -fsS http://127.0.0.1:8000/api/health && break || sleep 1; done
    - cd frontend
    - npm run dev -- --host=0.0.0.0 --port=5173 &
    - for i in $(seq 1 30); do curl -fsS http://localhost:5173 && break || sleep 1; done
    - npm run e2e
  artifacts:
    when: always
    expire_in: 7 days
    paths:
      - frontend/test-results/
      - frontend/playwright-report/
